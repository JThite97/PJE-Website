<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | PJ Enterprise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0A1128;
      color: #94a3b8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code { font-size: 8rem; font-weight: 700; color: rgba(255,255,255,0.08); line-height: 1; }
    h2 { font-size: 1.5rem; color: #fff; margin: -2rem 0 1rem; position: relative; }
    p { max-width: 28rem; margin: 0 auto 2rem; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #0052FF;
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #00E5FF; color: #0A1128; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
